name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "backend/**"
  pull_request:
    branches: [develop, staging, main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Create test environment file
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL" > .env.local
          printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY" >> .env.local
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY" >> .env.local
          printf 'SUPABASE_JWT_SECRET=%s\n' "$SUPABASE_JWT_SECRET" >> .env.local
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" >> .env.local
          printf 'ENVIRONMENT=%s\n' "test" >> .env.local

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

      - name: Check test coverage
        working-directory: backend
        run: python -m pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=70