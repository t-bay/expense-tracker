name: Deploy

on:
  push:
    branches: [develop, main]

jobs:
  # ── Deploy Frontend to Vercel ─────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create environment file
        working-directory: frontend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          printf 'VITE_SUPABASE_URL=%s\n' "$SUPABASE_URL" > .env.local
          printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY" >> .env.local
          printf 'VITE_API_URL=%s\n' "$VITE_API_URL" >> .env.local

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$GITHUB_REF" == "refs/heads/main" ]; then
            echo "Deploying to production..."
            vercel --prod --token=$VERCEL_TOKEN --yes --prebuilt
          else
            echo "Deploying to staging (preview)..."
            vercel --token=$VERCEL_TOKEN --yes --prebuilt
          fi