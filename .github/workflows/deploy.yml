name: Deploy

on:
  push:
    branches: [develop, main]

jobs:
  notify:
    name: Deployment Triggered
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: |
          echo "Push to ${{ github.ref }} detected."
          echo "Railway and Vercel will handle deployments automatically via GitHub integration."
          echo "Check Railway dashboard and Vercel dashboard for deployment status."